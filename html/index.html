<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcare Training Courses</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Healthcare & Caregiving Training Suite</h1>
    <p class="subtitle">Professional, beginner‑friendly modules generated by Claude</p>
  </header>
  <main class="main">
    <section class="module-list">
      <h2>Available Modules</h2>
      <ul id="moduleContainer">
        <!-- Module items will be injected by script.js -->
      </ul>
    </section>
    <section class="progress-section" aria-label="Progress">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="progressText" class="progress-text">0% completed</p>
    </section>
  </main>
  <footer class="footer">
    <small>© 2026 AI‑Assisted Training Generator</small>
  </footer>
  <script src="script.js"></script>
</body>
</html>
